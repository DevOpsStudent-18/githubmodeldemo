- name: Review with GitHub Models
  id: review
  env:
    GITHUB_PAT: ${{ secrets.PAT }}
  run: |

    PROMPT=$(cat <<'PROMPT'
Review this PR diff. Identify bugs, security concerns, performance issues, maintainability issues, and provide recommendations.
PROMPT
)

    jq -n \
      --arg prompt "$PROMPT" \
      --rawfile diff pr.diff \
      '{
        model:"openai/gpt-4.1",
        messages:[
          {
            role:"system",
            content:"You are a senior software engineer performing pull request reviews."
          },
          {
            role:"user",
            content:($prompt + "\n\n" + $diff)
          }
        ]
      }' > payload.json

    curl -s -L \
      -X POST \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer $GITHUB_PAT" \
      -H "X-GitHub-Api-Version: 2022-11-28" \
      -H "Content-Type: application/json" \
      https://models.github.ai/inference/chat/completions \
      -d @payload.json \
      > response.json
